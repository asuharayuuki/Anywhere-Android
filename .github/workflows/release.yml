name: Build Release APK

on:
  push:
    tags:
      - 'v*' # Trigger on version tags
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Keystore and local.properties
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ ! -z "$KEYSTORE_BASE64" ]; then
          echo "Setting up keystore from secrets..."
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          echo "KEYSTORE_FILE=../keystore.jks" >> local.properties
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> local.properties
          echo "KEY_ALIAS=$KEY_ALIAS" >> local.properties
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> local.properties
        else
          echo "No keystore secrets found, generating a random temporary keystore..."
          keytool -genkey -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias release -dname "CN=Random, OU=Random, O=Random, L=Random, S=Random, C=US" -storepass randompass -keypass randompass
          echo "KEYSTORE_FILE=../keystore.jks" >> local.properties
          echo "KEYSTORE_PASSWORD=randompass" >> local.properties
          echo "KEY_ALIAS=release" >> local.properties
          echo "KEY_PASSWORD=randompass" >> local.properties
        fi

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk
